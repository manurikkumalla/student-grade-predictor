<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <div class="icon-circle mb-3 mx-auto">
                <i class="fa-solid fa-graduation-cap text-white fs-2"></i>
            </div>
            <h1 class="fw-bold text-dark">Student Grade Predictor</h1>
            <p class="text-secondary">Analyze your scores, target your GPA, and predict required grades.</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <h5 class="card-title fw-bold mb-3 text-primary"><i class="fa-solid fa-book-open me-2"></i>Add Course</h5>
                    <form id="courseForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-medium">Course Name</label>
                            <input type="text" id="courseName" class="form-control" placeholder="e.g., Mathematics, Coding" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label text-secondary small fw-medium">Credits</label>
                                <input type="number" id="courseCredits" min="1" max="6" class="form-control" value="3" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary small fw-medium">Expected Grade</label>
                                <select id="courseGrade" class="form-select" required>
                                    <option value="4.0">A (4.0)</option>
                                    <option value="3.5">B+ (3.5)</option>
                                    <option value="3.0">B (3.0)</option>
                                    <option value="2.5">C+ (2.5)</option>
                                    <option value="2.0">C (2.0)</option>
                                    <option value="1.0">D (1.0)</option>
                                    <option value="0.0">F (0.0)</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Add Course</button>
                    </form>
                </div>

                <div class="card border-0 shadow-sm p-4">
                    <h5 class="card-title fw-bold mb-3 text-primary"><i class="fa-solid fa-bullseye me-2"></i>GPA Target</h5>
                    <label class="form-label text-secondary small fw-medium d-flex justify-content-between">
                        <span>Target GPA Score</span>
                        <span id="targetGpaValue" class="fw-bold text-primary">3.50</span>
                    </label>
                    <input type="range" class="form-range" id="targetGpa" min="1.0" max="4.0" step="0.05" value="3.50">
                    <div class="mt-3">
                        <label class="form-label text-secondary small fw-medium">Remaining Semester Credits</label>
                        <input type="number" id="remainingCredits" min="0" max="30" class="form-control" value="12">
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div id="predictionResultCard" class="card border-0 shadow-sm p-4 mb-4 text-white bg-indigo">
                    <h5 class="fw-bold mb-2"><i class="fa-solid fa-chart-line me-2"></i>Prediction Dashboard</h5>
                    <p id="predictionMessage" class="mb-0 fs-6 leading-relaxed">Add courses and set target to unlock predictive analytics.</p>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <div class="card border-0 shadow-sm p-3 text-center">
                            <small class="text-secondary small fw-semibold">Current GPA</small>
                            <span class="fs-2 fw-bold text-primary" id="currentGpa">0.00</span>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="card border-0 shadow-sm p-3 text-center">
                            <small class="text-secondary small fw-semibold">Earned Credits</small>
                            <span class="fs-2 fw-bold text-dark" id="totalCredits">0</span>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4">
                    <h5 class="card-title fw-bold mb-3 text-primary"><i class="fa-solid fa-list-ul me-2"></i>Semester Courses</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Course Name</th>
                                    <th>Credits</th>
                                    <th>Grade Point</th>
                                    <th class="text-end">Action</th>
                                </tr>
                            </thead>
                            <tbody id="coursesList">
                                <!-- Dynamic dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
